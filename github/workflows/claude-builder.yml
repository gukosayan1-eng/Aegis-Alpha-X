name: Claude Builder

on:
  push:
    paths:
      - "tasks/queue/**.md"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install anthropic
      - env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/claude_build_queue.py
      - run: |
          git config user.name "Claude Builder"
          git config user.email "claude-builder@users.noreply.github.com"
          git add .
          git diff --cached --quiet || (git commit -m "Claude Builder: Completed queued task" && git push)
