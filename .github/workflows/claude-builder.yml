name: Claude Builder

on:
  push:
    paths:
      - "tasks/queue/**.md"

  workflow_dispatch:
    inputs:
      task_file:
        description: "Optional task file inside tasks/queue/"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Anthropic SDK
        run: |
          python -m pip install --upgrade pip
          pip install anthropic

      - name: Execute Claude Builder
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TASK_FILE: ${{ github.event.inputs.task_file }}
        run: |
          python .github/scripts/claude_build_queue.py

      - name: Commit Generated Files
        run: |
          git config user.name "Claude Builder"
          git config user.email "claude-builder@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes generated."
          else
            git commit -m "Claude Builder: Completed queued task"
            git push
          fi
